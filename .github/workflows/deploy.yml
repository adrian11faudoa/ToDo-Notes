# .github/workflows/deploy.yml
# CI/CD pipeline:
#   1. Test (pytest)
#   2. Build Docker image
#   3. Push to ECR
#   4. Run Alembic migrations
#   5. Deploy to ECS (rolling update)

name: Deploy to AWS

on:
  push:
    branches:
      - main        # → prod
      - develop     # → dev
  pull_request:
    branches: [main, develop]

env:
  AWS_REGION: us-east-1
  PYTHON_VERSION: "3.12"

jobs:
  # ── Test ────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: noteflow_test
          POSTGRES_USER: noteflow
          POSTGRES_PASSWORD: test_password
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 10s

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Run tests
        env:
          ENVIRONMENT: test
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_NAME: noteflow_test
          DATABASE_USER: noteflow
          DATABASE_PASSWORD: test_password
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          SECRET_KEY: test-secret-key-for-ci-only
          AWS_REGION: us-east-1
          S3_BUCKET_ATTACHMENTS: test-attachments
          S3_BUCKET_EXPORTS: test-exports
        run: |
          cd backend
          pytest tests/ -v --cov=app --cov-report=xml --cov-fail-under=70

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
        continue-on-error: true

  # ── Build & Push to ECR ─────────────────────────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      ecr_url:   ${{ steps.meta.outputs.ecr_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
            echo "aws_account_id=${{ secrets.AWS_ACCOUNT_ID_PROD }}" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
            echo "aws_account_id=${{ secrets.AWS_ACCOUNT_ID_DEV }}" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Image metadata
        id: meta
        run: |
          ECR_URL="${{ steps.ecr-login.outputs.registry }}/noteflow-${{ steps.env.outputs.environment }}/api"
          IMAGE_TAG="${{ github.sha }}"
          echo "ecr_url=${ECR_URL}" >> $GITHUB_OUTPUT
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT

      - name: Build & push Docker image
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: infrastructure/docker/Dockerfile.api
          push: true
          tags: |
            ${{ steps.meta.outputs.ecr_url }}:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.ecr_url }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_SHA=${{ github.sha }}

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.ecr_url }}:${{ steps.meta.outputs.image_tag }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 0   # don't fail — report only
        continue-on-error: true

  # ── Run Migrations ──────────────────────────────────────────────
  migrate:
    name: Run Migrations
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
            echo "cluster=noteflow-production-cluster" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
            echo "cluster=noteflow-dev-cluster" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Run Alembic migrations via ECS run-task
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster ${{ steps.env.outputs.cluster }} \
            --task-definition noteflow-${{ steps.env.outputs.environment }}-api \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.PRIVATE_SUBNET_IDS }}],securityGroups=[${{ secrets.ECS_SG_ID }}]}" \
            --overrides '{"containerOverrides":[{"name":"api","command":["alembic","upgrade","head"]}]}' \
            --query 'tasks[0].taskArn' \
            --output text)

          echo "Migration task: $TASK_ARN"

          # Wait for migration to complete
          aws ecs wait tasks-stopped \
            --cluster ${{ steps.env.outputs.cluster }} \
            --tasks $TASK_ARN

          # Check exit code
          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster ${{ steps.env.outputs.cluster }} \
            --tasks $TASK_ARN \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)

          if [ "$EXIT_CODE" != "0" ]; then
            echo "Migration failed with exit code $EXIT_CODE"
            exit 1
          fi
          echo "Migrations applied successfully"

  # ── Deploy to ECS ───────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build, migrate]
    if: github.event_name == 'push'

    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'development' }}

    steps:
      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
            echo "cluster=noteflow-production-cluster" >> $GITHUB_OUTPUT
            echo "service=noteflow-production-api" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
            echo "cluster=noteflow-dev-cluster" >> $GITHUB_OUTPUT
            echo "service=noteflow-dev-api" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Deploy to ECS (rolling update)
        run: |
          # Force new deployment — ECS pulls the :latest image
          aws ecs update-service \
            --cluster ${{ steps.env.outputs.cluster }} \
            --service ${{ steps.env.outputs.service }} \
            --force-new-deployment \
            --output json | jq '.service.deployments[0]'

      - name: Wait for deployment stability
        run: |
          echo "Waiting for ECS service to stabilize…"
          aws ecs wait services-stable \
            --cluster ${{ steps.env.outputs.cluster }} \
            --services ${{ steps.env.outputs.service }}
          echo "Deployment complete ✓"

      - name: Verify health endpoint
        run: |
          sleep 30
          # Get ALB DNS from ECS service
          curl -f "https://${{ secrets.API_DOMAIN }}/health" || exit 1
          echo "Health check passed ✓"

      - name: Notify on failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          text: "🚨 NoteFlow ${{ steps.env.outputs.environment }} deployment FAILED on ${{ github.sha }}"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true
